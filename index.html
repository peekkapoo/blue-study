    <meta property="og:site_name" content="Blue Study" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://blue-study.vercel.app/" />
    <meta property="og:title" content="Blue Study | Smart Learning Workspace" />
    <meta property="og:description" content="Plan tasks, take notes, and track focused study sessions in one place." />
    <meta property="og:image" content="https://blue-study.vercel.app/og-image-final.png" />

    <meta name="twitter:image:alt" content="Blue Study Smart Learning Workspace poster" />
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#E0F2FE 0%,#EFF6FF 100%);padding:16px;box-sizing:border-box;">
        <div style="max-width:560px;width:100%;background:#fff;border:1px solid #bae6fd;border-radius:20px;padding:20px;box-shadow:0 12px 26px rgba(2,132,199,.12);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">
          <h1 style="margin:0;font-size:22px;color:#0a1628;">Loading Blue Study</h1>
          <p style="margin:10px 0 0;font-size:14px;color:#475569;">If this stays here for more than a few seconds, press Ctrl+F5 to hard refresh.</p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');

        function setBootError(message) {
          if (!root) return;
          root.innerHTML = '' +
            '<div style="min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#E0F2FE 0%,#EFF6FF 100%);padding:16px;box-sizing:border-box;">' +
              '<div style="max-width:560px;width:100%;background:#fff;border:1px solid #bae6fd;border-radius:20px;padding:20px;box-shadow:0 12px 26px rgba(2,132,199,.12);font-family:system-ui,-apple-system,\'Segoe UI\',Roboto,sans-serif;">' +
                '<h1 style="margin:0;font-size:22px;color:#0a1628;">Application startup error</h1>' +
                '<p style="margin:10px 0 0;font-size:14px;color:#475569;">' + message + '</p>' +
              '</div>' +
            '</div>';
        }

        window.addEventListener('error', function (event) {
          var msg = event && event.message ? String(event.message) : 'Unknown error while loading scripts.';
          setBootError(msg + ' Please hard refresh (Ctrl+F5).');
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason ? String(event.reason) : 'Unknown rejected promise during startup.';
          setBootError(reason + ' Please hard refresh (Ctrl+F5).');
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
